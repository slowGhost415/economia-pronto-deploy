databases:
  - name: economia-db
    databaseName: economia
    user: economia
    plan: free

services:
  - type: web
    name: economia-site
    runtime: node
    buildCommand: npm run render:build
    startCommand: npm run db:push && npm run render:start
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: economia-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
